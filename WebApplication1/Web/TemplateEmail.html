<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
        }

        .container {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .header {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
        }

        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header">Olá, {{Nome}}!</h2>
        <p>Uma nova despesa foi registada no sistema <strong>LabraSoft</strong>:</p>
        <ul>
            <li><strong>Descrição:</strong> {{Descricao}}</li>
            <li><strong>Valor:</strong> <span class="highlight">R$ {{Valor}}</span></li>
            <li><strong>Data:</strong> {{Data}}</li>
        </ul>
        <p>Se não reconhece esta operação, entre em contacto com o suporte.</p>
        <hr />
        <p><em>Equipa LabraSoft - Sistema de Gestão Académica</em></p>
    </div>
</body>
</html>
