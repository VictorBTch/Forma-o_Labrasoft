<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fundação - Cadastro de Bolsista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">Cadastro de Bolsista</h2>
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nome Completo:</label>
                        <input type="text" class="form-control" placeholder="Digite o nome">
                    </div>
                    <div class="mb-3">
                            <label class="form-label">CPF:</label>
                            <input type="text" class="form-control" placeholder="Digite o CPF">
                    </div>
                    <div class="mb-3">      
                            <label class="form-label">Matrícula:</label>
                            <input type="text" class="form-control" placeholder="Digite a Matrícula">
                    </div>
                    <div class="mb-3">
                            <label class="form-label">Data de nascimento:</label>
                            <input type="date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sexo:</label>
                        <select name="sexo" class="form-control" id="sexo">
                            <option value="" disabled selected>Selecione</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>

                        <hr />
                        <button type="button" class="btn btn-success">Salvar (Semana 1: Visual)</button>
</form>
            </div>
        </div>
    </div>

</body>
</html>
